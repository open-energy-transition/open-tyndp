name: Internal Bug Report
description: Report a bug or issue (for Open-TYNDP developers with security review)
labels: ["needs triage", "bug"]
type: "Bug"

body:
- type: markdown
  attributes:
    value: |
      **Intended for Open-TYNDP developers.** External contributors are welcome to use this but could also use the [external issue template](https://github.com/open-energy-transition/open-tyndp/issues/new?template=external.md).
      
      Please do not post usage questions here. Ask them on the [PyPSA/Open-TYNDP Discord channel](https://discord.com/channels/911692131440148490/1414977512089321564) or contact tyndp@openenergytransition.org.

- type: checkboxes
  id: version_checks
  attributes:
    label: Version Checks
    description: Where does this bug exist? Check all that apply.
    options:
    - label: I have confirmed this bug exists on the latest [release](https://github.com/open-energy-transition/open-tyndp/releases) of Open-TYNDP
    - label: I have confirmed this bug exists on the current [`master`](https://github.com/open-energy-transition/open-tyndp/tree/master) branch of Open-TYNDP
    - label: I have confirmed this bug does NOT exist in the upstream [`master`](https://github.com/pypsa/pypsa-eur/tree/master) branch of PyPSA-Eur (Open-TYNDP specific)

- type: dropdown
  id: affected_component
  attributes:
    label: Affected Component/Workflow
    description: Which part of Open-TYNDP is affected?
    options:
    - Scenario Building (SB)
    - Cost-Benefit Analysis (CBA)
    - Network optimization
    - Data retrieval/processing
    - Plotting/visualization
    - Documentation
    - CI/CD workflows
    - Dependencies/environment
    - Other (specify in description)
  validations:
    required: true

- type: textarea
  id: bug_description
  attributes:
    label: Bug Description
    description: |
      Clear description of the bug. What is broken? When does it occur?
    placeholder: |
      Describe the issue, including:
      - What operation/workflow were you running?
      - What scenario/configuration were you using?
      - Any error messages or unexpected outputs
  validations:
    required: true

- type: textarea
  id: actual_behavior
  attributes:
    label: Actual Behavior
    description: What happens currently? Include error messages, stack traces, or incorrect outputs.
    placeholder: |
      Example:
      ```
      Error: MissingOutputException in rule build_statistics
      ```
  validations:
    required: true

- type: textarea
  id: expected_behavior
  attributes:
    label: Expected Behavior
    description: What should happen instead?
    placeholder: |
      Example: The rule should complete successfully and produce results/[prefix]/[run]/benchmarks/tyndp-2024/resources/benchmarks_s_all___2040.csv.
  validations:
    required: true

- type: textarea
  id: reproducible_example
  attributes:
    label: Steps to Reproduce
    description: |
      Provide minimal steps to reproduce the bug. Include relevant config files, commands, or code snippets.
    placeholder: |
      Example:
      1. Set config option `remove_last_day: true`
      2. Run `pixi run snakemake -call build_statistics`
      3. Observe error in logs/...
    render: shell
  validations:
    required: true

- type: dropdown
  id: severity
  attributes:
    label: Severity / Impact
    description: How severe is this bug?
    options:
    - Critical - Blocks major workflows, data loss risk, or security issue
    - High - Significant impact on results or usability
    - Medium - Partial functionality affected, workaround available
    - Low - Minor issue, cosmetic, or edge case
  validations:
    required: true

- type: markdown
  attributes:
    value: |
      ---
      ## Change Classification & Security Review

      Bug fixes require classification and security review per OET-ISMS-006, Annex A.

- type: dropdown
  id: change_classification
  attributes:
    label: Change Classification
    description: |
      How urgent/critical is this fix?
    options:
    - "Standard — Low-risk fix (typo, docs, minor bug) → Developer self-approves"
    - "Normal — Logic/data/API fix requiring testing → Project Lead approval before merge"
    - "Emergency (Break-Glass) — Critical hotfix, security breach, or data integrity issue → Verbal approval from Senior Lead; document retrospectively within 24h"
  validations:
    required: true

- type: checkboxes
  id: security_risk_check
  attributes:
    label: Security & Data Risk Check
    description: |
      Answer honestly. Checking a box flags what needs review but does not block the fix.
    options:
    - label: This bug involves or could expose sensitive data (user PII, client grid data, credentials)
    - label: This bug affects external data sources, APIs, download URLs, or authentication
    - label: This bug changes the attack surface (new ports, APIs, external deps, auth flows)
    - label: This bug could affect data integrity or reproducibility of published results

- type: dropdown
  id: risk_level
  attributes:
    label: Risk Level of Fix
    description: |
      What is the risk level of the proposed fix? (Required for Normal and Emergency changes)
    options:
    - Low
    - Medium
    - High (requires kick-off security review)
    - N/A (Standard change)

- type: textarea
  id: proposed_fix
  attributes:
    label: Proposed Fix / Workaround
    description: |
      If you know how to fix this, describe the solution. Include workarounds if available.
    placeholder: |
      Example:
      - Fix: Move benchmark computation outside the conditional block
      - Workaround: Set `remove_last_day: false` in config

- type: textarea
  id: test_validation_plan
  attributes:
    label: Test & Validation Plan
    description: |
      How should this fix be tested? List specific commands, files to check, or validation steps.
    placeholder: |
      Example:
      - Run `pixi run snakemake -call build_statistics --configfile config/test/...`
      - Verify benchmarks_s_all___2040.csv is created
      - Compare results with previous run (should match within tolerance)
      - Check logs for warnings
  validations:
    required: true

- type: textarea
  id: rollback_plan
  attributes:
    label: Rollback / Recovery Plan
    description: |
      Required for Normal and Emergency fixes. How to undo this fix within ~15 minutes if it causes new issues?
    placeholder: |
      Example:
      - Revert PR commit SHA abc123
      - Re-run affected workflow with previous config
      - Restore output files from backup if data was modified

- type: textarea
  id: environment_info
  attributes:
    label: Environment Information
    description: |
      Share your environment details. For pixi, paste relevant sections from `pixi.lock` or run `pixi info`.
      For conda, paste output of `conda env export`.
    placeholder: |
      Pixi environment: open-tyndp
      OS: macOS / Linux / Windows
      Pixi/Conda: Can paste pixi.lock excerpt or conda env export here
    render: yaml

- type: textarea
  id: additional_context
  attributes:
    label: Additional Context
    description: |
      Any other relevant information: links to logs, related issues/PRs, screenshots, config files, affected scenarios, etc.
    placeholder: |
      - Related to issue #123
      - Affects scenarios: 2040NT, 2040DE
      - Log file: logs/...
      - Configuration: config/config.tyndp.yaml
