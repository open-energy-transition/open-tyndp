name: Spike (Maintainer)
description: Explore a concept, gather information, or investigate a technical question
labels: []
type: "Spike"

body:
- type: markdown
  attributes:
    value: |
      **Intended for maintainers.**

      Spikes are exploratory issues meant to gather information and explore concepts. They typically don't result in PRs but help inform future implementation decisions.

- type: input
  id: parent_issue
  attributes:
    label: Related Parent/Issue (optional)
    description: |
      Is this spike related to another issue (parent, sub issue, bug report)?
    placeholder: "#123 or leave blank if standalone"

- type: checkboxes
  id: affected_component
  attributes:
    label: Affected Component/Workflow
    description: |
      Label this issue with the affected component(s) using GitHub labels.
    options:
    - label: I have labeled this spike with the affected component(s) using GitHub labels (e.g., SB, CBA, documentation, etc.).
  validations:
    required: true

- type: textarea
  id: context
  attributes:
    label: Background / Context
    description: |
      Provide context for this spike. Why is this exploration needed? What led to this investigation? What are we trying to explore or understand? What is the goal of this spike?
    placeholder: |
      Examples:
      - Stakeholder feedback indicates need for feature X
      - Recent changes caused performance regression
      - Explore feasibility of integrating new data source
      - Additional context, references, links to related issues, documentation, papers, code examples, etc.
  validations:
    required: true

- type: textarea
  id: success_criteria
  attributes:
    label: Definition of Done / Success Criteria
    description: |
      How do we know when this spike is complete? What outcomes are expected?
    placeholder: |
      - Document findings in this issue
      - Identify recommended approach
      - Create follow-up implementation issues if needed
      - Share findings with team

- type: textarea
  id: timeframe
  attributes:
    label: Estimated Timeframe
    description: |
      Roughly how long should this spike take? (e.g., 1 day, 3 days, 1 week)
    placeholder: "e.g., 2-3 days"

- type: textarea
  id: findings
  attributes:
    label: Findings / Outcomes
    description: |
      **To be filled in during/after the spike.** Document key findings, insights, and recommendations here.
    placeholder: |
      # Findings

      ## Summary
      [High-level summary of what was discovered]

      ## Key Insights
      - Finding 1: ...
      - Finding 2: ...
      - Finding 3: ...

      ## Recommendations
      - Recommended approach: ...
      - Pros: ...
      - Cons: ...
      - Alternative considerations: ...

      ## Follow-up Actions
      - [ ] Create implementation issue #XXX
      - [ ] Update documentation
      - [ ] Schedule team discussion
    render: markdown
