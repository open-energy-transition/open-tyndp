# CBA test config
# Overlays on config/test/config.tyndp.yaml to test CBA workflow independently
# Run with: snakemake cba_test --configfile config/test/config.tyndp.yaml config/test/config.cba.yaml

run:
  name: "test-sector-tyndp"
  disable_progressbar: true
  shared_resources:
    policy: false
  shared_cutouts: true

tyndp_scenario: NT

enable:
  retrieve: false

clustering:
  temporal:
    resolution_sector: 12H

cba:
  hurdle_costs: 0.01
  planning_horizons:
  - 2030
  methods:
  - toot
  - pint
  projects:
    # === TOOT Projects ===
    # In reference grid (removing them tests TOOT methodology)
    - t4      # tested - status changed with MSV
    - t16     # tested - large benefit reduction with MSV
    - t1      # new
    - t29     # new
    # Not in reference grid
    - t28     # tested - status changed with MSV
    - t35     # tested
    - t33     # new
    - t47     # new
    # === PINT Projects ===
    # Not in reference grid (adding them tests PINT methodology)
    - t40     # tested
    - t225    # tested - status changed with MSV
    - t239    # new
    - t243    # new
    # In reference grid
    - t126    # tested
    - t267    # new
    - t276    # new
  method_assignment: entsoe_labels

  # MSV extraction settings
  # Controls how marginal storage values are extracted from perfect foresight solve
  msv_extraction:
    # Temporal resolution for MSV extraction
    # Options: false (use native resolution), "24H", "48H", etc.
    # Lower resolution = faster solve but less accurate MSV
    resolution: 24H  # Coarser than target (12H) to test resampling
    # Threshold for warning about extreme MSV values (EUR/MWh)
    extreme_threshold: 1000.0
    # Method for resampling MSV to target network resolution
    # Options: ffill, bfill, interpolate, nearest, rolling_mean
    resample_method: ffill
    # Window size for rolling_mean method (number of snapshots)
    rolling_window: null

  # Rolling horizon solving options for CBA dispatch
  solving:
    options:
      # Rolling horizon window size (snapshots)
      # 146 = ~73 days at 12H resolution, gives 5 chunks for full year
      horizon: 146
      # Overlap between windows (0 = no overlap)
      overlap: 0
      # Enable load shedding to ensure feasibility
      load_shedding: true
      # I/O API for solver (direct = ~20% faster with HiGHS)
      io_api: direct
    solver:
      name: highs
      options: highs-simplex
    solver_options:
      highs-simplex:
        parallel: "off"
