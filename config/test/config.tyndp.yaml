run:
  name: "test-sector-tyndp"
  disable_progressbar: true
  shared_resources:
    policy: false

# TODO set foresight
foresight: myopic

tyndp_scenario: NT

launch_explorer: false

scenario:
  clusters:
  - all
  planning_horizons:
  - 2030
  - 2035
  - 2040

countries: ['AL', 'AT', 'BA', 'BE', 'BG', 'CH', 'CZ', 'CY', 'DE', 'DK', 'EE', 'ES', 'FI', 'FR', 'GB', 'GR', 'HR', 'HU', 'IE', 'IT', 'LT', 'LU', 'LV', 'ME', 'MK', 'MT', 'NL', 'NO', 'PL', 'PT', 'RO', 'RS', 'SE', 'SI', 'SK']

snapshots:
  start: "2013-03-01"
  end: "2013-03-08"

co2_budget:

electricity:
  base_network: tyndp

  extendable_carriers:
    Generator: []
    StorageUnit: []
    Store: []
    Link: [H2 pipeline]

  conventional_carriers: []
  tyndp_conventional_carriers:
  - gas
  - coal
  - lignite
  - uranium
  - oil-light
  - oil-heavy
  - oil-shale
  group_tyndp_conventionals: false
  renewable_carriers: []
  tyndp_renewable_carriers:
  - other-res
  - hydro-ror
  - hydro-reservoir
  - hydro-pondage
  - hydro-phs
  - hydro-phs-pure
  - onwind
  - solar-pv-utility
  - solar-pv-rooftop
  - offwind-ac-fb-r
  - offwind-ac-fl-r
  - offwind-dc-fb-r
  - offwind-dc-fl-r
  - offwind-dc-fb-oh
  - offwind-dc-fl-oh
  - offwind-h2-fb-oh
  - offwind-h2-fl-oh
  tyndp_stores:
  - battery
  - h2_cavern
  - h2_tank
  estimate_renewable_capacities:
    enable: false

  pecd_renewable_profiles:
    enable: true
    pre_built:
      cyears:
      - 1995
      - 2008
      - 2009
    fill_gaps_method: zero
    # Complete PECD data is only available for the years 2030, 2040
    # TODO: adjust once udpated 2050 PECD data is available
    available_years:
    - 2030
    - 2040
    technologies:
    - Wind_Offshore
    - LFSolarPVRooftop
    - LFSolarPVUtility
    - Wind_Onshore

  pemmdb_hydro_profiles:
    enable: true
    available_years:
    - 2030
    - 2040
    - 2050
    technologies:
    - Run_of_River
    - Pondage
    - Reservoir
    - PS_Open
    - PS_Closed

  pemmdb_capacities:
    enable: true
    nprocesses: 4
    available_years:
    - 2030
    - 2040
    - 2050
    technologies:
    - Solar
    - Wind
    - Hydro
    - Other_RES
    - Gas
    - Nuclear
    - Hard_coal
    - Lignite
    - Light_oil
    - Heavy_oil
    - Oil_shale
    - Other_Non-RES
    - Hydrogen
    - Electrolyser
    - Battery
    - DSR

  transmission_limit: v1.0

  constrain_dsr: true

atlite:
  default_cutout: europe-2013-03-sarah3-era5
  cutouts:
    europe-2013-03-sarah3-era5:
      time: ["2013-03-01", "2013-03-08"]

renewable:
  offwind-ac:
    max_depth: false
  offwind-dc:
    max_depth: false
  offwind-float:
    max_depth: false
    min_depth: false

conventional:
  tyndp_availability_profiles: true

links:
  p_max_pu: 1.0
  p_min_pu: 0

transmission_projects:
  enable: false

tyndp_investment_candidates:
  patch_sb_with_annexe: true
  elec_projects:
    2040:
    - 2030
    - 2035
  h2_projects:
    2040:
    - 2030
    - 2035

load:
  source: tyndp # opsd, tyndp
  fill_gaps:
    enable: false
  available_years_tyndp:
  - 2030
  - 2040
  - 2050
  manual_adjustments: false
  supplement_synthetic: false
  patch_demand_with_mm: true

pypsa_eur:
  Bus:
  - AC
  Link:
  - DC
  Generator:
  - ror
  StorageUnit:
  - PHS
  - hydro
  Store: []

biomass:
  share_unsustainable_use_retained:
    2020: 0
    2025: 0
    2030: 0
    2035: 0
    2040: 0
    2045: 0
    2050: 0
  share_sustainable_potential_available:
    2020: 1
    2025: 1
    2030: 1
    2035: 1
    2040: 1
    2045: 1
    2050: 1

existing_capacities:
  uniform_renewable_profiles: true

sector:
  transport: true
  heating: false
  biomass: true
  industry: false
  shipping: true
  aviation: true
  agriculture: false
  fossil_fuels: true

  land_transport_fuel_cell_share:  # Not modelled
    2030: 0
    2035: 0
    2040: 0
    2045: 0
    2050: 0
  land_transport_electric_share:  # included in exogenous demand
    2030: 0
    2035: 0
    2040: 0
    2045: 0
    2050: 0
  land_transport_ice_share:  # TODO Improve TYNDP 2024 approximations
    2030: 0.96
    2035: 0.82  # interpolation
    2040: 0.68
    2045: 0.42  # interpolation
    2050: 0.16
  shipping_hydrogen_share:  # included in exogenous demand  # TODO Validate assumption
    2030: 0
    2035: 0
    2040: 0
    2045: 0
    2050: 0
  shipping_methanol_share:  # included in exogenous demand  # TODO Validate assumption
    2030: 0
    2035: 0
    2040: 0
    2045: 0
    2050: 0
  shipping_oil_share:
    2030: 0.85
    2035: 0.65
    2040: 0.45
    2045: 0.2
    2050: 0
  bev_charge_efficiency: 0.94 # p.96 of Methodology Report TYNDP 2024
  oil_boilers: false
  biomass_boiler: false
  solar_thermal: false
  methanation: false
  ATR: false
  regional_co2_sequestration_potential:
    enable: false
  co2_sequestration_potential:
    # Values from TYNDP 2024 Supply Tool
    2030: 47
    2035: 167
    2040: 344
  co2_spatial: false
  co2_network: false
  methanol:
    methanol_to_power:
      ocgt: false
    biomass_to_methanol: false
  ammonia: false
  h2_topology_tyndp: true
  h2_reference_grid_source: entsoe
  h2_zones_tyndp: false
  h2_demand_patch_with_mm: true
  gas_network: false
  gas_demand_exogenously: true
  biomass_spatial: false
  biomass_to_liquid: true
  biomass_to_liquid_cc: true
  force_biomass_potential: true
  force_biogas_potential: true
  biomass_final_demand: # in TWh and for 8760h
    2030: 939
    2035: 863   # linear interpolation
    2040: 787
  electrobiofuels: false
  transmission_efficiency:
    enable:
    - gas pipeline
  imports:
    enable: true
    carriers:
    - H2
  offshore_hubs_tyndp:
    enable: true
    connect_isolated: true
    max_capacity:
      DC_OH: 10
      H2 pipeline OH: 30

costs:
  custom_cost_scn: NT
  emission_prices:
    enable: true
    co2:
      # Source: Methodology report, p32
      2030: 113.4
      2035: 130.2 # interpolated
      2040: 147
      2045: 157.5 # interpolated
      2050: 168

clustering:
  mode: administrative
  administrative:
    level: bz
  build_bidding_zones:
    remove_islands: true
    aggregate_to_tyndp: true
  simplify_network:
    remove_stubs: false
  temporal:
    # Important note: The segmentation (SEG) option is currently not supported, for details https://github.com/open-energy-transition/open-tyndp/pull/345
    resolution_sector: 6H

adjustments:
  electricity: false
  sector:
    factor:
      Generator:
        biogas:
          p_nom: # EU27 biogas potential for 8760h
            2030: 1.26  # PyPSA-Eur 301 TWh vs TYNDP 380 TWh
            2035: 1.89  # interpolated
            2040: 2.51  # PyPSA-Eur 306 TWh vs TYNDP 771 TWh
          e_sum_max:
            2030: 1.26
            2035: 1.89
            2040: 2.51
          e_sum_min:
            2030: 1.26
            2035: 1.89
            2040: 2.51
        solid biomass:
          p_nom: # EU27 biomass potential for 8760h
            2030: 2.02 # PyPSA-Eur 974 TWh vs TYNDP 1964 TWh (8736h value: 1959 TWh = 1463 Supply Tool + 496 Other-RES)
            2035: 1.90 # interpolated
            2040: 1.77 # PyPSA-Eur 950 TWh vs TYNDP 1678 TWh (8736h value: 1673 TWh = 1316 Supply Tool + 357 Other-RES)
          e_sum_max:
            2030: 2.02
            2035: 1.90
            2040: 1.77
          e_sum_min:
            2030: 2.02
            2035: 1.90
            2040: 1.77
    absolute: false

solving:
  options:
    load_shedding:
      enable: true
      apply_to_all_carriers: false
      carriers:
        H2: 3000
        AC: 3000
  solver:
    name: highs
    options: highs-default
  mem: 4000

plotting:
  energy_threshold: 1.
  projection:
    name: "LambertAzimuthalEqualArea"
  balance_map:
    imports_as_flows: true
    bus_carriers:
    - AC
    - H2
    - gas
    - oil
    - co2_stored
    H2:
      bus_factor: 0.005
      branch_factor: 0.04
      flow_factor: 25
  balance_map_interactive:
    bus_carriers:
    - AC
    - H2
    - gas
    - oil
    - co2_stored

benchmarking:
  enable: true

cba:
  hurdle_costs: 0.01 # Transmission line marginal cost
  co2_societal_cost: # euros/t; 2024 CBA Implementation Guidelines, p. 68
    2030:
      low: 126
      central: 238
      high: 315
    2040:
      low: 339
      central: 628
      high: 662
  planning_horizons:
  - 2030
  - 2040
  cba_scenario_input:
    use_presolved: false
    sb_version: latest # currently only latest is supported
  methods:
  - toot
  - pint
  projects:
  - t1-t35
  area: tyndp # options: tyndp (TODO: entso-e, eu27)
  remove_noisy_costs: true # Use pre-noise costs for indicators while keeping noisy costs in the solve
  negative_toot_capacity: zero

  # Storage settings for dispatch
  storage:
    # Carriers that remain cyclic (short-term storage)
    # All other store/storage unit carriers automatically receive
    # marginal storage value and have cyclicity disabled
    cyclic_carriers:
    - battery
    # Carriers whose state of charge is fixed at window boundaries
    # from perfect foresight (applies to StorageUnit components only)
    soc_boundary_carriers:
    - hydro-reservoir

  # Constrain DSR daily dispatch
  constrain_dsr: true

  # Marginal storage value extraction settings
  msv_extraction:
    # Temporal resolution for extraction solve
    # Options: false (use native resolution), "24H", "48H", etc.
    resolution: false
    # Resampling method: ffill (forward fill), interpolate (linear)
    resample_method: ffill
    # Solve options for MSV extraction
    solving:
      solver:
        name: highs
        options: "highs-simplex"

  # Rolling horizon solving settings
  solving:
    options:
      horizon: 168
      overlap: 1
      load_shedding:
        enable: true
        apply_to_all_carriers: true
      io_api: direct  # 20% faster than default lp mode for rolling horizon

    solver:
      name: highs
      options: highs-simplex

    solver_options:
      highs-simplex:
        parallel: "off" # does not speed up solution

