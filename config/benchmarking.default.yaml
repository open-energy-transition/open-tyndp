benchmarking:
  enable: false
  remove_last_day: false
  spatial:
    by_bus: true
    by_country: true


  tables:
    final_energy_demand:
      table_type: scenario_comparison
      rfc_sources:
      - report
      report:
        sheet_name: 5-
        unit: TWh
        index_col: 2
        header: [4, 5]
        names:
          index:
          - carrier
          column:
          - scenario
          - year
      mapping:
        AC: electricity
        AC_OH: electricity
        low voltage: electricity
        H2: hydrogen
        exogenous gas demand: methane
        oil: liquids
        kerosene for aviation: liquids
        shipping oil: liquids
        land transport oil: liquids
        coal: solids
        biomass to liquid: biofuels
